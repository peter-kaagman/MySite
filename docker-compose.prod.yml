services:
  mysite:
    build:
      context: .
      dockerfile: Dockerfile
    image: mysite:simple
    container_name: mysite-app
    restart: unless-stopped
    ports:
      - "3000:5000"
    environment:
      - PLACK_ENV=production
    volumes:
      # Only persist SQLite database - no live code syncing
      - ./db:/app/db
      # Logbestanden zichtbaar op de host
      - ./logs:/app/logs
      # Images opslaan op de host
      - ./images:/app/public/images
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
