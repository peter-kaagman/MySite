version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: mysite-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-mysite}
      POSTGRES_USER: ${DB_USER:-mysite_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-CHANGE_ME_STRONG_PASSWORD}
      POSTGRES_INITDB_ARGS: "-E UTF8"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-mysite_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # Redis Session Store
  redis:
    image: redis:7-alpine
    container_name: mysite-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-CHANGE_ME_REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - backend

  # MySite Application
  mysite:
    build: .
    image: mysite:latest
    container_name: mysite-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    
    ports:
      - "5000:5000"
    
    environment:
      # Application
      DANCER_ENVIRONMENT: production
      PLACK_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      
      # Database - PostgreSQL
      DB_TYPE: Pg
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-mysite}
      DB_USER: ${DB_USER:-mysite_user}
      DB_PASSWORD: ${DB_PASSWORD:-CHANGE_ME_STRONG_PASSWORD}
      
      # Session - Redis
      SESSION_ENGINE: Redis
      SESSION_SECRET: ${SESSION_SECRET:-CHANGE_ME_GENERATE_RANDOM_32_CHAR_STRING}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-CHANGE_ME_REDIS_PASSWORD}
      REDIS_DB: 0
    
    volumes:
      # Logs only (database and sessions are external now)
      - mysite-logs:/app/logs
    
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    
    networks:
      - backend
      - frontend

  # Nginx Reverse Proxy (optional but recommended)
  nginx:
    image: nginx:alpine
    container_name: mysite-nginx
    restart: unless-stopped
    depends_on:
      - mysite
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx-cache:/var/cache/nginx
    networks:
      - frontend
    # Uncomment when nginx.conf is configured
    # healthcheck:
    #   test: ["CMD", "nginx", "-t"]
    #   interval: 30s
    #   timeout: 3s
    #   retries: 3

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  mysite-logs:
    driver: local
  nginx-cache:
    driver: local

networks:
  frontend:
    name: mysite-frontend
  backend:
    name: mysite-backend
