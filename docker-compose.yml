services:
  mysite:
    build:
      context: .
      dockerfile: Dockerfile.alpine
    image: mysite:slim
    container_name: mysite-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PLACK_ENV=development
    volumes:
      # Live code development - changes immediately visible in container
      - ./lib:/app/lib              # Perl modules
      - ./views:/app/views          # Templates
      - ./public:/app/public        # Static files
      - ./bin:/app/bin              # Scripts
      - ./db:/app/db                # SQLite database
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
