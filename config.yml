# Image upload configuratie
image_upload:
  copyright: '© 2026 Peter Kaagman / MySite'
  # max_size: 2097152   # 2MB in bytes
  max_size: 4194304   # 2MB in bytes
  allowed_ext: ['.jpg', '.jpeg', '.png', '.gif', '.webp']
  allowed_mime: ['image/jpeg', 'image/png', 'image/gif', 'image/webp']
  sizes:
  - name: "thumb"
    width: 400
    height: 400
  - name: "medium"
    width: 800
    height: 800
  - name: "large"
    width: 1600
    height: 1200
  resize:
    max_width: 1920
    max_height: 1200

# This is the main configuration file of your Dancer2 app
# env-related settings should go to environments/$env.yml
# all the settings in this file will be loaded at Dancer's startup.

# === Basic configuration ===

# Your application's name
appname: "MySite"

# The default layout to use for your application (located in
# views/layouts/main.tt)
layout: "main"

# when the charset is set to UTF-8 Dancer2 will handle for you
# all the magic of encoding and decoding. You should not care
# about unicode within your app when this setting is set (recommended).
charset: "UTF-8"

# === Engines ===
#
# NOTE: All the engine configurations need to be under a single "engines:"
# key.  If you uncomment engine configurations below, make sure to delete
# all "engines:" lines except the first.  Otherwise, only the last
# "engines:" block will take effect.

# template engine
# simple: default and very basic template engine
# template_toolkit: TT

#template: "simple"


template: "template_toolkit"
session: "YAML"
# session: "Memcached"


engines:
  template:
    template_toolkit:
      # Note: start_tag and end_tag are regexes
      start_tag: '<%'
      end_tag:   '%>'
      pre_chomp: 1
    

# session engine
#
# Simple: in-memory session store - Dancer2::Session::Simple
# YAML: session stored in YAML files - Dancer2::Session::YAML
#
# Check out metacpan for other session storage options:
# https://metacpan.org/search?q=Dancer2%3A%3ASession&search_type=modules
#
# Default value for 'cookie_name' is 'dancer.session'. If you run multiple
# Dancer apps on the same host then you will need to make sure 'cookie_name'
# is different for each app.
#
#engines:
  session:
    YAML:
      cookie_name: MySite.session
        # is_secure: 1
        # is_http_only: 1
    # Memcached word voor sessions en metrics/observability ingezet
    Memcached:
#      memcached_servers: ["memcached-service:11211"] # via environment
      namespace: "mysite_session:"
      namespace_metrics: "mysite_metrics"
      expire_time: 3600
plugins:
    # Database:
    #     driver: SQLite
    #     database: './db/mysite.sqlite'
  DBIC:
    default:
      dsn: dbi:SQLite:dbname=db/mysite.sqlite
      schema_class: MySite::Schema
      options:
        sqlite_unicode: 1

oauth_providers:
  google:
    # client_id: <%= $ENV{GOOGLE_CLIENT_ID} // '' %>
    # client_secret: <%= $ENV{GOOGLE_CLIENT_SECRET} // '' %>
    authorize_url: 'https://accounts.google.com/o/oauth2/auth'
    token_url: 'https://oauth2.googleapis.com/token'
    userinfo_url: 'https://openidconnect.googleapis.com/v1/userinfo'
    scope: 'openid email profile'
  github:
    # client_id: <%= $ENV{GITHUB_CLIENT_ID} // '' %>
    # client_secret: <%= $ENV{GITHUB_CLIENT_SECRET} // '' %>
    authorize_url: 'https://github.com/login/oauth/authorize'
    token_url: 'https://github.com/login/oauth/access_token'
    userinfo_url: 'https://api.github.com/user'
    scope: 'user:email'
