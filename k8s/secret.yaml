apiVersion: v1
kind: Secret
metadata:
  name: mysite-secret
  namespace: mysite-prod
type: Opaque
stringData:
  # Database credentials (replace with actual values)
  DB_USER: "mysite_user"
  DB_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  
  # Session secret
  SESSION_SECRET: "CHANGE_ME_GENERATE_RANDOM_STRING"
  
  # OAuth/API keys (if needed)
  # GITHUB_CLIENT_ID: ""
  # GITHUB_CLIENT_SECRET: ""
---
# Note: In production, use external secret management like:
# - Sealed Secrets
# - External Secrets Operator
# - HashiCorp Vault
# - Cloud provider secrets (AWS Secrets Manager, Azure Key Vault, GCP Secret Manager)
