apiVersion: v1
kind: ConfigMap
metadata:
  name: mysite-config
  namespace: mysite-prod
data:
  # Application configuration
  DANCER_ENVIRONMENT: "production"
  PLACK_ENV: "production"
  LOG_LEVEL: "info"
  
  # Server configuration
  WORKERS: "4"
  PORT: "5000"
  
  # Session configuration
  SESSION_DIR: "/app/sessions"
  
  # Database configuration (non-sensitive)
  DB_TYPE: "SQLite"
  # For production, consider PostgreSQL/MySQL:
  # DB_TYPE: "Pg"
  # DB_HOST: "postgres-service.mysite-prod.svc.cluster.local"
  # DB_PORT: "5432"
  # DB_NAME: "mysite"
