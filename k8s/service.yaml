apiVersion: v1
kind: Service
metadata:
  name: mysite
  namespace: mysite-prod
  labels:
    app: mysite
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: mysite
  # Session affinity for sticky sessions (if needed)
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
