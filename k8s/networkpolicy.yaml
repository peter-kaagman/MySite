apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mysite
  namespace: mysite-prod
spec:
  podSelector:
    matchLabels:
      app: mysite
  policyTypes:
  - Ingress
  - Egress
  
  ingress:
  # Allow traffic from ingress controller
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 5000
  
  # Allow traffic from same namespace (for debugging)
  - from:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 5000
  
  egress:
  # Allow DNS
  - to:
    - namespaceSelector:
        matchLabels:
          name: kube-system
    ports:
    - protocol: UDP
      port: 53
  
  # Allow database access (adjust based on your DB)
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    ports:
    - protocol: TCP
      port: 5432
  
  # Allow external HTTPS (for API calls)
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443
