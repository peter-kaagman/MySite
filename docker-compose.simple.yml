version: '3.8'

services:
  mysite:
    build:
      context: .
      dockerfile: Dockerfile.simple
    image: mysite:simple
    container_name: mysite-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PLACK_ENV=development
    volumes:
      # Persist SQLite database only
      - ./db:/app/db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
