# configuration file for development environment

# use Log4perl for structured logging
logger: "Console::Colored"
# log4perl:
#   config: |
#     log4perl.rootLogger = DEBUG, LOGFILE, STDERR
#     log4perl.appender.LOGFILE = Log::Log4perl::Appender::File
#     log4perl.appender.LOGFILE.filename = logs/mysite.log
#     log4perl.appender.LOGFILE.mode = append
#     log4perl.appender.LOGFILE.layout = PatternLayout
#     log4perl.appender.LOGFILE.layout.ConversionPattern = [%d] [%p] %m%n
#     log4perl.appender.STDERR = Log::Log4perl::Appender::Screen
#     log4perl.appender.STDERR.stderr = 1
#     log4perl.appender.STDERR.layout = PatternLayout
#     log4perl.appender.STDERR.layout.ConversionPattern = [%d] [%p] %m%n

# the log level for this environment
# core is the lowest, it shows Dancer2's core log messages as well as yours
# (debug, info, warning and error)
log: "debug"

# should Dancer2 show a stacktrace when an 5xx error is caught?
# if set to yes, public/500.html will be ignored and either
# views/500.tt, 'error_template' template, or a default error template will be used.
show_stacktrace: 1

# print the banner
startup_info: 1

engines:
  session:
    Memcached:
      memcached_servers: localhost:11211

# client_id en client_secret komen uit:
# in dev: .env die in MySite geladen wordt
# in prod: via de Kubernetes secrets
oauth_providers:
  google:
    redirect_uri: "http://localhost:5000/auth/callback/google"
  github:
    redirect_uri: "http://localhost:5000/auth/callback/github"
